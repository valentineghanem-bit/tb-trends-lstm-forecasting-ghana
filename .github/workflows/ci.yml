name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all analysis scripts
        run: python -m py_compile analysis/*.py
      - name: Rebuild master datasets
        run: |
          python analysis/build_master.py
          python analysis/build_vulnerability_index.py
          python analysis/lock_hyperparameters.py
      - name: Run test suite
        run: pytest tests/ -v
